name: FAZZ-4 Oracle Ignition

on:
  push:
    branches: [ "main" ]

jobs:
  run-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Execute Asymptotic Alignment
        run: python fazz4_oracle.py
